<!-- maps/templates/maps/map_view.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>London Map</title>
    
    <!-- Leaflet CSS -->
    <link 
      rel="stylesheet" 
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    
    <style>
      #map {
        width: 100%;
        height: 600px; /* Adjust height as needed */
      }
    </style>
</head>
<body>
    <h1>Map of London</h1>
    <div id="map"></div>

    <!-- Leaflet JavaScript -->
    <script 
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    ></script>

    <script>
      // Initialize the map and set its view to London coordinates (51.5074° N, -0.1278° E)
      var map = L.map('map').setView([51.5074, -0.1278], 13); 

      // Add OSM tile layer
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
          attribution: '© OpenStreetMap contributors'
      }).addTo(map);
    </script>
</body>
</html>
